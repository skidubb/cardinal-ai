name: CE AGENTS CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  agent-builder-lint:
    name: Agent Builder — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CE - Agent Builder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13', cache: pip, cache-dependency-path: 'CE - Agent Builder/pyproject.toml' }
      - run: pip install -e ".[dev]"
      - run: ruff check src/csuite
      - run: mypy src/csuite --ignore-missing-imports

  agent-builder-test:
    name: Agent Builder — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CE - Agent Builder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13', cache: pip, cache-dependency-path: 'CE - Agent Builder/pyproject.toml' }
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v --tb=short -m "not integration"
        env:
          ANTHROPIC_API_KEY: sk-test-placeholder

  orchestration-lint:
    name: Orchestration — Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CE - Multi-Agent Orchestration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13', cache: pip, cache-dependency-path: 'CE - Multi-Agent Orchestration/requirements.txt' }
      - run: pip install -r requirements.txt && pip install ruff
      - run: ruff check protocols/ api/ --ignore E402

  orchestration-test:
    name: Orchestration — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CE - Multi-Agent Orchestration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13', cache: pip, cache-dependency-path: 'CE - Multi-Agent Orchestration/requirements.txt' }
      - run: pip install -r requirements.txt && pip install pytest fastapi httpx sqlmodel
      - run: pytest tests/ -v --tb=short
        env:
          ANTHROPIC_API_KEY: sk-test-placeholder

  orchestration-ui:
    name: Orchestration — UI Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CE - Multi-Agent Orchestration/ui
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: npm, cache-dependency-path: 'CE - Multi-Agent Orchestration/ui/package-lock.json' }
      - run: npm ci
      - run: npx vite build

  evals-test:
    name: Evals — Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: CE - Evals
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.13', cache: pip }
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v
