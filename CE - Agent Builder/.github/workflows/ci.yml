# Cardinal Element C-Suite CI Pipeline
# CTO Sprint 2 Deliverable 2: Integration Tests + GitHub Actions CI
#
# Runs on:
# - Every push to main
# - Every pull request
# - Daily at 6am UTC (catches API changes overnight)
#
# Tests cover:
# - Unit tests (cost tracker, config, models)
# - Integration tests (SEC EDGAR, Census Bureau, BLS, GitHub APIs)
# - Lint (ruff) and type check (mypy)

name: C-Suite CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Daily at 6am UTC -- catches API breaking changes before demos
    - cron: '0 6 * * *'

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src/csuite

      - name: Mypy type check
        run: mypy src/csuite --ignore-missing-imports

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v --tb=short -m "not integration"
        env:
          ANTHROPIC_API_KEY: sk-test-placeholder

  integration-tests:
    name: API Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Test SEC EDGAR API
        run: pytest tests/test_sec_edgar.py -v --tb=short
        timeout-minutes: 5

      - name: Test Census Bureau API
        run: pytest tests/test_census_api.py -v --tb=short
        timeout-minutes: 5

      - name: Test BLS API
        run: pytest tests/test_bls_api.py -v --tb=short
        timeout-minutes: 5

      - name: Test GitHub API
        run: pytest tests/test_github_api.py -v --tb=short
        timeout-minutes: 5

      - name: Test Cost Tracker
        run: pytest tests/test_cost_tracker.py -v --tb=short
        env:
          ANTHROPIC_API_KEY: sk-test-placeholder
