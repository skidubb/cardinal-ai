services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ce_platform
      POSTGRES_USER: ce
      POSTGRES_PASSWORD: ce_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ce -d ce_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://ce:ce_local@postgres:5432/ce_platform
      NEXTAUTH_SECRET: changeme-in-production
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false"
    ports:
      - "3000:3000"

volumes:
  pgdata:
