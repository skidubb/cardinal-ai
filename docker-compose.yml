services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ce_platform}
      POSTGRES_USER: ${POSTGRES_USER:-ce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Uncomment on fresh setup (empty pgdata) to auto-create the metabase DB:
      # - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ce -d ce_platform"]
      interval: 5s
      timeout: 3s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: ${POSTGRES_USER:-ce}
      MB_DB_PASS: ${POSTGRES_PASSWORD}
      MB_DB_HOST: postgres
    ports:
      - "3001:3000"

  # Langfuse: using Langfuse Cloud (us.cloud.langfuse.com) instead of self-hosted.
  # Set LANGFUSE_SECRET_KEY, LANGFUSE_PUBLIC_KEY, LANGFUSE_BASE_URL in your .env.
  # To self-host instead, uncomment below:
  # langfuse:
  #   image: langfuse/langfuse:2
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql://${POSTGRES_USER:-ce}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ce_platform}
  #     NEXTAUTH_SECRET: changeme-in-production
  #     NEXTAUTH_URL: http://localhost:3000
  #     SALT: changeme
  #     ENCRYPTION_KEY: changeme-generate-with-openssl-rand-hex-32
  #     TELEMETRY_ENABLED: "false"
  #   ports:
  #     - "3000:3000"

  backend:
    build:
      context: ./CE - Multi-Agent Orchestration
      dockerfile_inline: |
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt uvicorn[standard] sse-starlette
        COPY . .
        CMD ["uvicorn", "api.server:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./CE - Multi-Agent Orchestration/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-ce}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-ce_platform}
    ports:
      - "8000:8000"
    volumes:
      - ./CE - Multi-Agent Orchestration:/app
    restart: unless-stopped

volumes:
  pgdata:
